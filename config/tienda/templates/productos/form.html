{% extends 'base.html' %}
{% load static %}
{% block contenido %}

<h2 class="mb-4">
    {% if form.instance.id_producto %}
    Editar Producto
    {% else %}
    Nuevo Producto
    {% endif %}
</h2>
<form method="post">
    {% csrf_token %}

    {% for field in form %}
    <div class="mb-3">
        <label class="form-label">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
        <div class="text-danger">
            {{ field.errors }}
        </div>
        {% endif %}
    </div>
    {% endfor %}

    <div class="d-flex justify_content-between">
        <a href="{% url 'listar_productos_admin' %}" class="btn btn-secondary">Volver</a>
        <button type="submit" class="btn btn-primary">Guardar</button>
    </div>

</form>


{% endblock %}
